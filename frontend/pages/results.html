<script>
// Company name search — filters already-rendered cards instantly, no API calls
document.addEventListener("DOMContentLoaded", () => {
    const searchInput = document.getElementById("companySearchInput");
    if (!searchInput) return;

    searchInput.addEventListener("input", function () {
        const query = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll(".company-card");

        let visibleCount = 0;
        cards.forEach(card => {
            const nameEl = card.querySelector(".company-name");
            const name   = nameEl ? nameEl.innerText.toLowerCase() : "";
            const show   = name.includes(query);
            card.style.display = show ? "" : "none";
            if (show) visibleCount++;
        });

        // Update subtitle to reflect filtered count
        const subtitle = document.getElementById("resultsSubtitle");
        if (subtitle && cards.length > 0) {
            subtitle.textContent = query
                ? `Showing ${visibleCount} of ${cards.length} companies`
                : subtitle.dataset.fullText || subtitle.textContent;
            if (!query) delete subtitle.dataset.fullText;
            else if (!subtitle.dataset.fullText) subtitle.dataset.fullText = subtitle.textContent;
        }
    });
});
</script>
<script>
// Sort buttons — re-render window._allCompanies in a new order
document.addEventListener("DOMContentLoaded", () => {
    const sortBtns = {
        price:    document.getElementById("sortByPrice"),
        distance: document.getElementById("sortByDistance"),
        rating:   document.getElementById("sortByRating"),
    };

    const allBtns = Object.values(sortBtns).filter(Boolean);

    // Visual active state helpers
    function setActive(activeBtn) {
        allBtns.forEach(btn => {
            btn.classList.remove("bg-white", "dark:bg-slate-700", "shadow-sm",
                                 "text-slate-900", "dark:text-slate-100");
            btn.classList.add("text-slate-500", "dark:text-slate-400");
        });
        activeBtn.classList.remove("text-slate-500", "dark:text-slate-400");
        activeBtn.classList.add("bg-white", "dark:bg-slate-700", "shadow-sm",
                                "text-slate-900", "dark:text-slate-100");
    }

    function sortAndRender(compareFn, activeBtn) {
        if (!window._allCompanies || window._allCompanies.length === 0) return;
        const sorted = [...window._allCompanies].sort(compareFn);
        window.renderCompanies(sorted);
        setActive(activeBtn);
        // Clear search input so filter doesn't interfere
        const searchInput = document.getElementById("companySearchInput");
        if (searchInput) searchInput.value = "";
    }

    if (sortBtns.price) {
        sortBtns.price.addEventListener("click", () => {
            sortAndRender((a, b) => a.price - b.price, sortBtns.price);
        });
    }

    if (sortBtns.rating) {
        sortBtns.rating.addEventListener("click", () => {
            sortAndRender((a, b) => b.rating - a.rating, sortBtns.rating);
        });
    }

    if (sortBtns.distance) {
        sortBtns.distance.addEventListener("click", () => {
            sortAndRender((a, b) => a.distance_km - b.distance_km, sortBtns.distance);
        });
    }
});
</script>

<script>
// --- Profile Dropdown Logic ---
document.addEventListener("DOMContentLoaded", () => {
    const profileBtn = document.getElementById("profileBtn");
    const profileDropdown = document.getElementById("profileDropdown");
    
    if(profileBtn && profileDropdown) {
        profileBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle("opacity-0");
            profileDropdown.classList.toggle("invisible");
            profileDropdown.classList.toggle("scale-95");
            profileDropdown.classList.toggle("scale-100");
        });
        
        document.addEventListener("click", (e) => {
            if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                profileDropdown.classList.add("opacity-0", "invisible", "scale-95");
                profileDropdown.classList.remove("scale-100");
            }
        });
    }
});

// --- Map Modal Logic ---
document.addEventListener("DOMContentLoaded", () => {
    const viewMapBtn = document.getElementById("viewMapBtn");
    const closeMapBtn = document.getElementById("closeMapBtn");
    const mapModal = document.getElementById("mapModal");
    const mapModalContent = document.getElementById("mapModalContent");
    const mapLoading = document.getElementById("mapLoading");
    
    let map = null;
    let markersLayer = null;

    if (!viewMapBtn || !mapModal) return;

    viewMapBtn.addEventListener("click", () => {
        // Open Modal
        mapModal.classList.remove("opacity-0", "invisible");
        mapModalContent.classList.remove("scale-95");
        
        // Initialize Map if not already done
        if (!map) {
            map = L.map("tankerMap").setView([18.5204, 73.8567], 12); // Default to Pune
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }
        
        // Fix leaflet rendering issues in modals
        setTimeout(() => { map.invalidateSize(); }, 300);
        
        fetchAndRenderMapData();
    });

    closeMapBtn.addEventListener("click", () => {
        mapModal.classList.add("opacity-0", "invisible");
        mapModalContent.classList.add("scale-95");
    });

    async function fetchAndRenderMapData() {
        if (!mapLoading) return;
        mapLoading.style.display = "flex";
        
        let city = sessionStorage.getItem("city") || "Pune";
        city = city.charAt(0).toUpperCase() + city.slice(1).toLowerCase();

        try {
            // Get User Location (Mock)
            let userLat = 18.5204;
            let userLng = 73.8567;
            
            // Fast API endpoint fetch
            const res = await fetch(`http://localhost:8001/api/v1/companies/search?district=${encodeURIComponent(city)}`);
            if (!res.ok) throw new Error("Failed to fetch Map Data from Backend Endpoint");
            const tankers = await res.json();
            
            if (markersLayer) markersLayer.clearLayers();
            
            // Find cheapest
            let cheapestId = null;
            let minPrice = Infinity;
            tankers.forEach(t => {
                if (t.price < minPrice) { minPrice = t.price; cheapestId = t.company_name; }
            });

            const bounds = [];

            // Update Mock User Location if companies are found
            if (tankers.length > 0 && tankers[0].latitude) {
                userLat = tankers[0].latitude - 0.02;
                userLng = tankers[0].longitude - 0.02;
            }

            // User marker
            const userIcon = L.divIcon({
                html: '<span class="material-symbols-outlined text-blue-600 text-3xl" style="drop-shadow: 0 4px 6px rgba(0,0,0,0.3)">person_pin_circle</span>',
                className: '',
                iconSize: [30, 30],
                iconAnchor: [15, 30]
            });
            L.marker([userLat, userLng], {icon: userIcon})
                .addTo(markersLayer)
                .bindPopup('<strong class="text-sm font-bold text-slate-800">You are here</strong>');
            bounds.push([userLat, userLng]);

            tankers.forEach(t => {
                const lat = t.latitude || (userLat + (Math.random()-0.5)*0.1);
                const lng = t.longitude || (userLng + (Math.random()-0.5)*0.1);
                
                const isCheapest = (t.company_name === cheapestId);
                const markerColor = isCheapest ? 'text-green-500' : 'text-primary';
                const distKm = t.distance_km || (Math.random() * 8 + 1).toFixed(1); // true distance

                const icon = L.divIcon({
                    html: `<span class="material-symbols-outlined ${markerColor} text-4xl" style="drop-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s;">water_drop</span>`,
                    className: '',
                    iconSize: [36, 36],
                    iconAnchor: [18, 36],
                    popupAnchor: [0, -36]
                });

                const popupHtml = `
                    <div class="px-2 py-1 min-w-[200px]">
                        <h4 class="font-bold text-slate-900 text-base mb-1">${t.company_name}</h4>
                        <div class="text-sm text-slate-600 space-y-1 mb-3">
                            <div class="flex justify-between items-center"><span class="font-medium">Capacity:</span> <span>${t.capacity}L</span></div>
                            <div class="flex justify-between items-center"><span class="font-medium">Price:</span> <span class="text-green-600 font-bold border ${isCheapest ? "border-green-500 bg-green-50 px-1 rounded": "border-transparent"}">₹${t.price}</span></div>
                            <div class="flex justify-between items-center"><span class="font-medium">Distance:</span> <span>~${distKm} km</span></div>
                        </div>
                        <button class="w-full bg-gradient-to-r from-primary to-blue-600 hover:opacity-90 text-white font-bold py-2 rounded-lg text-sm transition-opacity shadow-md btn-gradient"
                                onclick="sessionStorage.setItem('companyId','${t.company_id}'); sessionStorage.setItem('companyName','${t.company_name.replace(/'/g, "\\'")}'); sessionStorage.setItem('price','${t.price}'); sessionStorage.setItem('district','${t.district}'); window.location.href='payment.html'">
                            Book Tanker
                        </button>
                    </div>
                `;

                L.marker([lat, lng], {icon: icon})
                    .addTo(markersLayer)
                    .bindPopup(popupHtml);
                
                bounds.push([lat, lng]);
            });

            if (bounds.length > 0) {
                map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50] });
            }

        } catch (e) {
            console.error("Map fetch error:", e);
        } finally {
            mapLoading.style.display = "none";
        }
    }
});
</script>
