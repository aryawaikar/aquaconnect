<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AquaConnect - User Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<script src="../js/unifiedNavbar.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navbar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl">waves</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">AquaConnect</h2>
</div>
<div class="flex gap-4">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm font-bold">
<span>Help Center</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold">
<span>Sign In</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[600px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Progress Bar -->
<div class="h-1.5 w-full bg-slate-100 dark:bg-slate-800">
<div class="h-full bg-gradient-to-r from-primary to-cyan-400 w-2/3"></div>
</div>
<div class="p-8 sm:p-10">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Create Your Account</h1>
<p class="text-slate-500 dark:text-slate-400">Step 2: Enter your personal details to get started.</p>
</div>
<!-- Form -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Johnathan Doe" type="text"/>
</div>
</div><div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="john.doe@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-4 text-slate-400">location_on</span>
<textarea class="w-full pl-12 pr-4 py-4 min-h-[120px] rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none" placeholder="123 Water St, Marine Bay, CA 90210"></textarea>
</div>
</div>
</div>
<!-- Buttons -->
<div class="flex flex-col sm:flex-row gap-4 mt-10">
<button class="flex-1 h-14 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold text-lg shadow-lg shadow-purple-500/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">arrow_back</span>
                                Back
                            </button>
<button onclick="window.location.href='search.html'" class="flex-[2] h-14 rounded-xl bg-gradient-to-r from-primary to-cyan-500 hover:from-primary/90 hover:to-cyan-600 text-white font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                                Continue
                                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-500">
<p>Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Log in here</a></p>
</div>
</div>
</div>
</main>
<!-- Bottom Background Elements (Decorative) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-purple-500 to-pink-500 opacity-50"></div>
</div>
</div>
<canvas id="shader-background" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></canvas>
<script src="../js/shaderBackground.js"></script>
<script src="../js/globalStyles.js"></script>
<script src="../js/themeGlobal.js"></script>
<script src="../js/branding.js"></script>
</body></html>
